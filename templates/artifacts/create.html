{% extends "base.html" %}

{% block title %}New Artifact - gest{% endblock %}
{% block nav_artifacts %}class="active"{% endblock %}

{% block content %}
<h1 class="section-heading">New Artifact</h1>
<div class="term">
  <div class="term-bar"><span class="term-title">create artifact</span></div>
  <div class="term-body">
    {% if let Some(err) = error %}
    <div class="form-error" style="margin-bottom: 12px;">{{ err }}</div>
    {% endif %}
    <form method="post" action="/artifacts">
      <input type="hidden" name="_csrf" value="__CSRF_TOKEN__">
      <div class="form-group">
        <label for="title">Title</label>
        <input class="form-input" type="text" id="title" name="title" required autofocus placeholder="Artifact title..." value="{{ title }}">
      </div>
      <div class="form-group md-preview-container">
        <label for="body">Body</label>
        <button type="button" class="btn md-preview-btn md-preview-toggle" data-target="body">Preview</button>
        <textarea class="form-textarea" id="body" name="body" placeholder="Markdown supported...">{{ body }}</textarea>
        <div id="body-preview" class="md-preview md-content"></div>
      </div>
      <div class="form-group">
        <label for="tags">Tags (comma-separated)</label>
        <input class="form-input" type="text" id="tags" name="tags" placeholder="e.g. design, api, docs" value="{{ tags }}">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Create Artifact</button>
        <a class="btn" href="/artifacts">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
