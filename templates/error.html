{% extends "base.html" %}

{% block title %}{{ status }} — error · gest{% endblock %}

{% block content %}
<div class="term">
  <div class="term-bar">
    <span class="term-title">{{ status }}</span>
  </div>
  <div class="term-body" style="text-align: center; padding: 48px 20px;">
    <p class="section-heading" style="font-size: 2rem; margin-bottom: 8px;">{{ status }}</p>
    <p class="c-pewter" style="margin-bottom: 24px;">{{ message }}</p>
    <a href="/" class="btn btn-primary">Back to dashboard</a>
  </div>
</div>
{% endblock %}
