{% extends "base.html" %}

{% block title %}New Task - gest{% endblock %}
{% block nav_tasks %}class="active"{% endblock %}

{% block content %}
<h1 class="section-heading">New Task</h1>
<div class="term">
  <div class="term-bar"><span class="term-title">create task</span></div>
  <div class="term-body">
    <form method="post" action="/tasks">
      <div class="form-group">
        <label for="title">Title</label>
        <input class="form-input" type="text" id="title" name="title" required autofocus placeholder="Task title...">
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea class="form-textarea" id="description" name="description" placeholder="Markdown supported..."></textarea>
      </div>
      <div class="form-group">
        <label for="priority">Priority (0=critical, 1=high, 2=medium, 3=low)</label>
        <input class="form-input" type="number" id="priority" name="priority" min="0" max="4">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Create Task</button>
        <a class="btn" href="/tasks">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
